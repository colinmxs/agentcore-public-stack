name: 'Configure AWS Credentials'
description: 'Configure AWS credentials using OIDC or access keys with automatic fallback'
inputs:
  aws-region:
    description: 'AWS Region'
    required: true
  role-session-name:
    description: 'Role session name for OIDC authentication'
    required: false
    default: 'GitHubActions'
  aws-role-arn:
    description: 'AWS Role ARN for OIDC (from secrets)'
    required: false
  aws-access-key-id:
    description: 'AWS Access Key ID (fallback for non-OIDC)'
    required: false
  aws-secret-access-key:
    description: 'AWS Secret Access Key (fallback for non-OIDC)'
    required: false

runs:
  using: 'composite'
  steps:
    # Sanitize session name: replace illegal chars with '-', truncate to 64
    - name: Sanitize role session name
      id: sanitize
      shell: bash
      run: |
        RAW="${{ inputs.role-session-name }}"
        SAFE=$(echo "$RAW" | sed 's/[^a-zA-Z0-9_=,.@-]/-/g' | cut -c1-64)
        echo "name=$SAFE" >> "$GITHUB_OUTPUT"

    - name: Configure AWS credentials (OIDC)
      if: ${{ inputs.aws-role-arn != '' }}
      uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: ${{ inputs.aws-region }}
        role-session-name: ${{ steps.sanitize.outputs.name }}

    - name: Configure AWS credentials (Access Keys)
      if: ${{ inputs.aws-role-arn == '' }}
      uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ${{ inputs.aws-region }}
