name: Nightly Deploy Pipeline

on:
  workflow_call:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-platform:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ vars.CDK_AWS_REGION || 'us-west-2' }}
          aws-role-arn: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Deploy PlatformStack
        run: bash scripts/platform/deploy.sh

  deploy-backend:
    needs: deploy-platform
    runs-on: ubuntu-24.04
    outputs:
      app_api_image_tag: ${{ steps.build.outputs.app_api_image_tag }}
      inference_api_image_tag: ${{ steps.build.outputs.inference_api_image_tag }}
      rag_ingestion_image_tag: ${{ steps.build.outputs.rag_ingestion_image_tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ vars.CDK_AWS_REGION || 'us-west-2' }}
          aws-role-arn: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Build images
        id: build
        run: bash scripts/build/build-all-images.sh

      - name: Deploy BackendStack
        env:
          APP_API_IMAGE_TAG: ${{ steps.build.outputs.app_api_image_tag }}
          INFERENCE_API_IMAGE_TAG: ${{ steps.build.outputs.inference_api_image_tag }}
          RAG_INGESTION_IMAGE_TAG: ${{ steps.build.outputs.rag_ingestion_image_tag }}
        run: bash scripts/backend/deploy.sh

  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ vars.CDK_AWS_REGION || 'us-west-2' }}
          aws-role-arn: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Build SPA
        run: bash scripts/frontend/build.sh

      - name: Deploy to S3 + invalidate CloudFront
        run: bash scripts/frontend/deploy.sh
