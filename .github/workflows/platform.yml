name: Platform Stack

on:
  workflow_dispatch:
  push:
    branches: [develop, main]
    paths:
      - 'infrastructure/lib/platform-stack.ts'
      - 'infrastructure/lib/constructs/**'
      - 'infrastructure/lib/config.ts'
      - 'infrastructure/bin/infrastructure.ts'
      - 'scripts/platform/**'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ vars.CDK_AWS_REGION || 'us-west-2' }}
          aws-role-arn: ${{ vars.AWS_ROLE_ARN || secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy PlatformStack
        run: bash scripts/platform/deploy.sh
