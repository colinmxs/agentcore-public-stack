name: Platform Stack

on:
  workflow_dispatch:
  # ----------------------------------------------------------------- #
  # TEMPORARY: push triggers disabled to give downstream forks a buffer
  # to absorb the platform-as-bootstrap refactor + cross-pool sub-remap
  # restore changes. Re-enable by uncommenting the block below.
  # ----------------------------------------------------------------- #
  # push:
  #   branches: [develop, main]
  #   paths:
  #     - 'infrastructure/lib/platform-stack.ts'
  #     - 'infrastructure/lib/constructs/**'
  #     - 'infrastructure/lib/config.ts'
  #     - 'infrastructure/bin/infrastructure.ts'
  #     - 'scripts/platform/**'

permissions:
  contents: read

env:
  CDK_REQUIRE_APPROVAL: never
  LOAD_ENV_QUIET: true

concurrency:
  group: platform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test-infra:
    name: Test infrastructure (jest)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json
      - name: Install
        working-directory: infrastructure
        run: npm ci --prefer-offline
      - name: Run tests
        working-directory: infrastructure
        run: npx jest --maxWorkers=2

  deploy:
    name: Deploy PlatformStack
    needs: test-infra
    runs-on: ubuntu-24.04
    environment: ${{ (github.ref == 'refs/heads/main' && 'production') || 'development' }}

    permissions:
      id-token: write
      contents: read

    env:
      # Environment-scoped configuration (MUST be at job level with environment: set)
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      CDK_DOMAIN_NAME: ${{ vars.CDK_DOMAIN_NAME }}
      CDK_CORS_ORIGINS: ${{ vars.CDK_CORS_ORIGINS }}
      CDK_VPC_CIDR: ${{ vars.CDK_VPC_CIDR }}
      CDK_ALB_SUBDOMAIN: ${{ vars.CDK_ALB_SUBDOMAIN }}
      CDK_CERTIFICATE_ARN: ${{ vars.CDK_CERTIFICATE_ARN }}
      CDK_RETAIN_DATA_ON_DELETE: ${{ vars.CDK_RETAIN_DATA_ON_DELETE }}
      CDK_HOSTED_ZONE_DOMAIN: ${{ vars.CDK_HOSTED_ZONE_DOMAIN }}
      CDK_COGNITO_DOMAIN_PREFIX: ${{ vars.CDK_COGNITO_DOMAIN_PREFIX }}
      CDK_COGNITO_CALLBACK_URLS: ${{ vars.CDK_COGNITO_CALLBACK_URLS }}
      CDK_COGNITO_LOGOUT_URLS: ${{ vars.CDK_COGNITO_LOGOUT_URLS }}
      CDK_COGNITO_SUPPORTED_IDPS: ${{ vars.CDK_COGNITO_SUPPORTED_IDPS }}
      CDK_ARTIFACTS_CERTIFICATE_ARN: ${{ vars.CDK_ARTIFACTS_CERTIFICATE_ARN }}
      CDK_FRONTEND_CERTIFICATE_ARN: ${{ vars.CDK_FRONTEND_CERTIFICATE_ARN }}
      # Secrets
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - name: Deploy PlatformStack
        run: bash scripts/platform/deploy.sh
