name: Restore Data

on:
  workflow_dispatch:
    inputs:
      backup_bucket:
        description: 'Backup S3 bucket name (e.g. myprefix-backup-20260520T173042Z)'
        required: true
        type: string
      manifest_key:
        description: 'Manifest key in backup bucket (e.g. myprefix/20260520T173042Z/manifest.json)'
        required: true
        type: string
      target_prefix:
        description: 'Target CDK project prefix'
        required: true
        type: string
      region:
        description: 'AWS region'
        required: true
        type: string
        default: 'us-west-2'
      dry_run:
        description: 'Dry run (print what would be restored without writing)'
        required: false
        type: boolean
        default: true
      skip_cognito_users:
        description: 'Skip Cognito user import'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  restore:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/configure-aws-credentials

      - uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        working-directory: scripts/restore-data
        run: uv sync

      - name: Run restore
        working-directory: scripts/restore-data
        env:
          BACKUP_BUCKET: ${{ inputs.backup_bucket }}
          MANIFEST_KEY: ${{ inputs.manifest_key }}
          TARGET_PREFIX: ${{ inputs.target_prefix }}
          REGION: ${{ inputs.region }}
        run: |
          ARGS="--backup-bucket $BACKUP_BUCKET --manifest-key $MANIFEST_KEY --target-prefix $TARGET_PREFIX --region $REGION"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ inputs.skip_cognito_users }}" = "true" ]; then
            ARGS="$ARGS --skip-cognito-users"
          fi
          uv run python restore.py $ARGS
