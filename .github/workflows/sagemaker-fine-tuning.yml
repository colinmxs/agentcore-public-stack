name: "Step 2 — Deploy SageMaker Fine-Tuning"

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'infrastructure/lib/sagemaker-fine-tuning-stack.ts'
      - 'infrastructure/lib/config.ts'
      - 'infrastructure/bin/infrastructure.ts'
      - 'infrastructure/cdk.json'
      - 'infrastructure/cdk.context.json'
      - 'infrastructure/package.json'
      - 'scripts/stack-sagemaker-fine-tuning/**'
      - '.github/workflows/sagemaker-fine-tuning.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'infrastructure/lib/sagemaker-fine-tuning-stack.ts'
      - 'infrastructure/lib/config.ts'
      - 'infrastructure/bin/infrastructure.ts'
      - 'infrastructure/cdk.json'
      - 'infrastructure/cdk.context.json'
      - 'infrastructure/package.json'
      - 'scripts/stack-sagemaker-fine-tuning/**'
      - '.github/workflows/sagemaker-fine-tuning.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
          - development
      skip_tests:
        description: 'Skip tests'
        required: false
        default: 'false'
      skip_deploy:
        description: 'Skip deployment'
        required: false
        default: 'false'

env:
  # Build and Deploy Configuration (non-sensitive, repository-level)
  CDK_REQUIRE_APPROVAL: never
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Ensure only one deployment runs at a time
concurrency:
  group: sagemaker-fine-tuning-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-stack-dependencies:
    name: Check Stack Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run stack dependency tests
        run: |
          bash scripts/common/test-stack-dependencies.sh

  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          bash scripts/common/install-deps.sh

      - name: Install CDK dependencies
        run: |
          bash scripts/stack-sagemaker-fine-tuning/install.sh

      - name: Save node_modules cache
        uses: actions/cache/save@v5
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

  build:
    name: Build CDK Code
    runs-on: ubuntu-latest
    needs: [install, check-stack-dependencies]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Build CDK
        run: |
          bash scripts/stack-sagemaker-fine-tuning/build-cdk.sh

      - name: Save build artifacts cache
        uses: actions/cache/save@v5
        with:
          path: |
            infrastructure/lib/**/*.js
            infrastructure/lib/**/*.d.ts
            infrastructure/bin/**/*.js
            infrastructure/bin/**/*.d.ts
          key: infrastructure-build-${{ github.sha }}

  synth:
    name: Synthesize CloudFormation Template
    runs-on: ubuntu-latest
    needs: build

    # Select environment based on trigger
    # Manual: workflow_dispatch input
    # Automatic: main → production, develop → development
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'development') || 'development' }}

    permissions:
      id-token: write
      contents: read

    env:
      # Environment-scoped configuration
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      CDK_VPC_CIDR: ${{ vars.CDK_VPC_CIDR }}
      CDK_FINE_TUNING_ENABLED: ${{ vars.CDK_FINE_TUNING_ENABLED }}
      CDK_CORS_ORIGINS: ${{ vars.CDK_CORS_ORIGINS }}
      CDK_DOMAIN_NAME: ${{ vars.CDK_DOMAIN_NAME }}
      CDK_RETAIN_DATA_ON_DELETE: ${{ vars.CDK_RETAIN_DATA_ON_DELETE }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Restore build artifacts
        uses: actions/cache/restore@v5
        with:
          path: |
            infrastructure/lib/**/*.js
            infrastructure/lib/**/*.d.ts
            infrastructure/bin/**/*.js
            infrastructure/bin/**/*.d.ts
          key: infrastructure-build-${{ github.sha }}

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-SageMakerFineTuning-Synth
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Install system dependencies
        run: |
          bash scripts/common/install-deps.sh

      - name: Synthesize CloudFormation template
        run: |
          bash scripts/stack-sagemaker-fine-tuning/synth.sh

      - name: Upload synthesized templates
        uses: actions/upload-artifact@v6
        with:
          name: sagemaker-fine-tuning-cdk-synth
          path: infrastructure/cdk.out/
          retention-days: 7

  test:
    name: Validate CloudFormation Template
    runs-on: ubuntu-latest
    needs: synth
    if: ${{ github.event.inputs.skip_tests != 'true' }}

    # Select environment based on trigger
    # Manual: workflow_dispatch input
    # Automatic: main → production, develop → development
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'development') || 'development' }}

    permissions:
      id-token: write
      contents: read

    env:
      # Environment-scoped configuration
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      CDK_VPC_CIDR: ${{ vars.CDK_VPC_CIDR }}
      CDK_FINE_TUNING_ENABLED: ${{ vars.CDK_FINE_TUNING_ENABLED }}
      CDK_CORS_ORIGINS: ${{ vars.CDK_CORS_ORIGINS }}
      CDK_DOMAIN_NAME: ${{ vars.CDK_DOMAIN_NAME }}
      CDK_RETAIN_DATA_ON_DELETE: ${{ vars.CDK_RETAIN_DATA_ON_DELETE }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Restore build artifacts
        uses: actions/cache/restore@v5
        with:
          path: |
            infrastructure/lib/**/*.js
            infrastructure/lib/**/*.d.ts
            infrastructure/bin/**/*.js
            infrastructure/bin/**/*.d.ts
          key: infrastructure-build-${{ github.sha }}

      - name: Download synthesized templates
        uses: actions/download-artifact@v7
        with:
          name: sagemaker-fine-tuning-cdk-synth
          path: infrastructure/cdk.out/

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-SageMakerFineTuning-Test
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Install system dependencies
        run: |
          bash scripts/common/install-deps.sh

      - name: Run CDK diff to validate template
        run: |
          bash scripts/stack-sagemaker-fine-tuning/test-cdk.sh

  deploy:
    name: Deploy SageMaker Fine-Tuning Stack
    runs-on: ubuntu-latest
    needs: test
    if: |
      always() && !cancelled() &&
      !contains(needs.*.result, 'failure') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_deploy != 'true')

    # Select environment based on trigger
    # Manual: workflow_dispatch input
    # Automatic: main → production, develop → development
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'development') || 'development' }}

    # Use OIDC for secure AWS authentication
    permissions:
      id-token: write
      contents: read

    env:
      # Environment-scoped configuration
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      CDK_VPC_CIDR: ${{ vars.CDK_VPC_CIDR }}
      CDK_FINE_TUNING_ENABLED: ${{ vars.CDK_FINE_TUNING_ENABLED }}
      CDK_CORS_ORIGINS: ${{ vars.CDK_CORS_ORIGINS }}
      CDK_DOMAIN_NAME: ${{ vars.CDK_DOMAIN_NAME }}
      CDK_RETAIN_DATA_ON_DELETE: ${{ vars.CDK_RETAIN_DATA_ON_DELETE }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Restore node_modules cache
        uses: actions/cache/restore@v5
        with:
          path: infrastructure/node_modules
          key: infrastructure-node-modules-${{ hashFiles('infrastructure/package-lock.json') }}

      - name: Restore build artifacts
        uses: actions/cache/restore@v5
        with:
          path: |
            infrastructure/lib/**/*.js
            infrastructure/lib/**/*.d.ts
            infrastructure/bin/**/*.js
            infrastructure/bin/**/*.d.ts
          key: infrastructure-build-${{ github.sha }}

      - name: Download synthesized templates
        uses: actions/download-artifact@v7
        with:
          name: sagemaker-fine-tuning-cdk-synth
          path: infrastructure/cdk.out/

      - name: Configure AWS credentials
        uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ env.CDK_AWS_REGION }}
          role-session-name: GitHubActions-SageMakerFineTuning-Deploy
          aws-role-arn: ${{ env.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}

      - name: Install system dependencies
        run: |
          bash scripts/common/install-deps.sh

      - name: Deploy SageMaker Fine-Tuning Stack
        run: |
          bash scripts/stack-sagemaker-fine-tuning/deploy.sh

      - name: Upload stack outputs
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: sagemaker-fine-tuning-deployment-outputs
          path: |
            cdk-outputs-sagemaker-fine-tuning.json
          retention-days: 30

      - name: Deployment summary
        if: success()
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production') || (github.ref == 'refs/heads/develop' && 'development') || 'development' }}"

          echo "## SageMaker Fine-Tuning Stack Deployment Successful ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${ENVIRONMENT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Region**: ${CDK_AWS_REGION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Project**: ${CDK_PROJECT_PREFIX}" >> $GITHUB_STEP_SUMMARY
          echo "- **Stack**: SageMakerFineTuningStack" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Resources Created" >> $GITHUB_STEP_SUMMARY
          echo "- DynamoDB tables (fine-tuning-jobs, fine-tuning-access)" >> $GITHUB_STEP_SUMMARY
          echo "- S3 bucket (fine-tuning-data) with CORS and lifecycle rules" >> $GITHUB_STEP_SUMMARY
          echo "- SageMaker execution IAM role" >> $GITHUB_STEP_SUMMARY
          echo "- SageMaker security group (outbound HTTPS only)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f cdk-outputs-sagemaker-fine-tuning.json ]; then
            echo "### Stack Outputs" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat cdk-outputs-sagemaker-fine-tuning.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
