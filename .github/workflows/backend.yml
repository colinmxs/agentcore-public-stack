name: Backend Stack

on:
  workflow_dispatch:
  push:
    branches: [develop, main]
    paths:
      - 'backend/**'
      - 'infrastructure/lib/backend-stack.ts'
      - 'infrastructure/lib/constructs/**'
      - 'infrastructure/lib/config.ts'
      - 'infrastructure/bin/infrastructure.ts'
      - 'scripts/backend/**'
      - 'scripts/build/**'

permissions:
  contents: read

env:
  CDK_REQUIRE_APPROVAL: never
  LOAD_ENV_QUIET: true

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: false

# ------------------------------------------------------------
# This workflow has one job per Docker image so the dashboard
# shows three independent build statuses (Build app-api,
# Build inference-api, Build rag-ingestion). Each build job
# computes a content hash of its image's input surface and
# skips the actual `docker build` + `docker push` when ECR
# already has an image with that tag — so a check-in that
# only touches one service rebuilds only that one image.
#
# All three build jobs are independent and run in parallel.
# The deploy job waits on all three so we can be sure every
# image's content-hash tag is in SSM before CDK reads it at
# synth time.
# ------------------------------------------------------------

jobs:
  test-infra:
    name: Test infrastructure (jest)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: infrastructure/package-lock.json
      - name: Install
        working-directory: infrastructure
        run: npm ci --prefer-offline
      - name: Run tests
        working-directory: infrastructure
        run: npx jest --maxWorkers=2

  test-backend:
    name: Test backend (pytest)
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          version: '0.7.12'
          enable-cache: true
          cache-dependency-glob: 'backend/uv.lock'
      - name: Sync deps
        working-directory: backend
        run: uv sync --extra agentcore --extra dev
      - name: Run pytest
        working-directory: backend
        run: uv run pytest tests/ -v

  build-app-api:
    name: Build app-api image
    needs: test-backend
    runs-on: ubuntu-24.04
    environment: ${{ (github.ref == 'refs/heads/main' && 'production') || 'development' }}

    permissions:
      id-token: write
      contents: read

    env:
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Build & push app-api
        id: build
        run: bash scripts/build/build-one.sh app-api

  build-inference-api:
    name: Build inference-api image
    needs: test-backend
    runs-on: ubuntu-24.04
    environment: ${{ (github.ref == 'refs/heads/main' && 'production') || 'development' }}

    permissions:
      id-token: write
      contents: read

    env:
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      # Inference API runs on AgentCore Runtime (linux/arm64). On the
      # amd64 GitHub-hosted runner we need QEMU + buildx emulation so
      # `docker build --platform linux/arm64` works.
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build & push inference-api
        id: build
        run: bash scripts/build/build-one.sh inference-api

  build-rag-ingestion:
    name: Build rag-ingestion image
    needs: test-backend
    runs-on: ubuntu-24.04
    environment: ${{ (github.ref == 'refs/heads/main' && 'production') || 'development' }}

    permissions:
      id-token: write
      contents: read

    env:
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Build & push rag-ingestion
        id: build
        run: bash scripts/build/build-one.sh rag-ingestion

  deploy-artifact-render-code:
    name: Deploy artifact-render Lambda code
    # Lambda zip code deploy. Mirrors the build-* jobs but for a
    # zip-based Lambda whose configuration lives in PlatformStack
    # with a stable bootstrap zip; this step ships the real handler
    # code via `aws lambda update-function-code` if its content hash
    # has changed since last deploy.
    needs: test-backend
    runs-on: ubuntu-24.04
    environment: ${{ (github.ref == 'refs/heads/main' && 'production') || 'development' }}

    permissions:
      id-token: write
      contents: read

    env:
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    outputs:
      code_hash: ${{ steps.deploy.outputs.code_hash }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Deploy artifact-render code
        id: deploy
        run: bash scripts/build/deploy-zip-lambda-one.sh artifact-render

  deploy-rag-ingestion-code:
    name: Deploy rag-ingestion Lambda image
    # Image-Lambda code deploy. The image was already built and
    # pushed by the build-rag-ingestion job; this step points the
    # Lambda at the new tag via `aws lambda update-function-code
    # --image-uri`. Mirrors deploy-artifact-render-code, but for
    # a DockerImage Lambda whose code lives in ECR.
    needs: [build-rag-ingestion, test-backend]
    runs-on: ubuntu-24.04
    environment: ${{ (github.ref == 'refs/heads/main' && 'production') || 'development' }}

    permissions:
      id-token: write
      contents: read

    env:
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    outputs:
      image_tag: ${{ steps.deploy.outputs.image_tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Deploy rag-ingestion image
        id: deploy
        run: bash scripts/build/deploy-image-lambda-one.sh rag-ingestion

  deploy-inference-api-code:
    name: Deploy inference-api image to AgentCore Runtime
    # Phase 5 of the platform-as-bootstrap refactor: the AgentCore
    # Runtime is configured in CDK with a stable bootstrap container
    # image; this step ships the real image via
    # `aws bedrock-agentcore-control update-agent-runtime`. Mirrors
    # deploy-rag-ingestion-code but for a Runtime instead of a Lambda.
    needs: [build-inference-api, test-backend]
    runs-on: ubuntu-24.04
    environment: ${{ (github.ref == 'refs/heads/main' && 'production') || 'development' }}

    permissions:
      id-token: write
      contents: read

    env:
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ vars.CDK_AWS_ACCOUNT }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    outputs:
      image_tag: ${{ steps.deploy.outputs.image_tag }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Deploy inference-api image
        id: deploy
        run: bash scripts/build/deploy-runtime-image-one.sh inference-api

  deploy:
    name: Deploy unified stack (app-api code via CFN until Phase 6 lands)
    # The unified PlatformStack now owns every resource (Phase 7 of
    # the platform-as-bootstrap refactor collapsed the old
    # BackendStack into Platform). Until Phases 5+6 land their
    # bootstrap-container patterns for the AgentCore Runtime and
    # App API ECS task def, those services' container images flow
    # through CDK at synth time — meaning a code change to
    # app-api or inference-api still requires a full CFN deploy.
    # That deploy lives here so the backend workflow remains the
    # entry point for backend-affecting commits.
    #
    # Once Phases 5+6 are done, this job goes away — backend.yml
    # becomes purely build-images + code-deploys (no CFN), and
    # platform.yml is the single CFN entry point.
    needs: [build-app-api, build-inference-api, build-rag-ingestion, deploy-artifact-render-code, deploy-rag-ingestion-code, deploy-inference-api-code, test-infra, test-backend]
    runs-on: ubuntu-24.04
    environment: ${{ (github.ref == 'refs/heads/main' && 'production') || 'development' }}

    permissions:
      id-token: write
      contents: read

    env:
      CDK_AWS_REGION: ${{ vars.AWS_REGION }}
      CDK_AWS_ACCOUNT: ${{ vars.CDK_AWS_ACCOUNT }}
      CDK_PROJECT_PREFIX: ${{ vars.CDK_PROJECT_PREFIX }}
      CDK_DOMAIN_NAME: ${{ vars.CDK_DOMAIN_NAME }}
      CDK_CORS_ORIGINS: ${{ vars.CDK_CORS_ORIGINS }}
      CDK_VPC_CIDR: ${{ vars.CDK_VPC_CIDR }}
      CDK_ALB_SUBDOMAIN: ${{ vars.CDK_ALB_SUBDOMAIN }}
      CDK_CERTIFICATE_ARN: ${{ vars.CDK_CERTIFICATE_ARN }}
      CDK_HOSTED_ZONE_DOMAIN: ${{ vars.CDK_HOSTED_ZONE_DOMAIN }}
      CDK_ARTIFACTS_CERTIFICATE_ARN: ${{ vars.CDK_ARTIFACTS_CERTIFICATE_ARN }}
      CDK_FRONTEND_CERTIFICATE_ARN: ${{ vars.CDK_FRONTEND_CERTIFICATE_ARN }}
      CDK_RETAIN_DATA_ON_DELETE: ${{ vars.CDK_RETAIN_DATA_ON_DELETE }}
      CDK_COGNITO_DOMAIN_PREFIX: ${{ vars.CDK_COGNITO_DOMAIN_PREFIX }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/configure-aws-credentials
        with:
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Deploy unified stack
        run: bash scripts/platform/deploy.sh
