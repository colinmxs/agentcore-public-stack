version: 2
updates:
  # ── Python backend ──
  - package-ecosystem: "pip"
    directory: "/backend"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Boise"
    open-pull-requests-limit: 10
    versioning-strategy: "increase-if-necessary"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "security"
      - "backend"
    groups:
      # Group minor/patch updates to reduce PR noise
      python-minor-patch:
        update-types: ["minor", "patch"]
        patterns: ["*"]

  # ── Frontend npm ──
  - package-ecosystem: "npm"
    directory: "/frontend/ai.client"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Boise"
    open-pull-requests-limit: 10
    versioning-strategy: "increase-if-necessary"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "frontend"
    groups:
      angular:
        patterns: ["@angular*"]
        update-types: ["minor", "patch"]
      frontend-minor-patch:
        exclude-patterns: ["@angular*"]
        update-types: ["minor", "patch"]

  # ── Infrastructure CDK ──
  - package-ecosystem: "npm"
    directory: "/infrastructure"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Boise"
    open-pull-requests-limit: 5
    versioning-strategy: "increase-if-necessary"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "infrastructure"
    groups:
      aws-cdk:
        patterns: ["aws-cdk*", "@aws-cdk*"]
        update-types: ["minor", "patch"]
      infra-minor-patch:
        exclude-patterns: ["aws-cdk*", "@aws-cdk*"]
        update-types: ["minor", "patch"]

  # ── GitHub Actions ──
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Boise"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]
        patterns: ["*"]
